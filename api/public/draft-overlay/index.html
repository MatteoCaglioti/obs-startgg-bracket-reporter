<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Draft Overlay</title>
  <link rel="stylesheet" href="draft-overlay.css">
</head>
<body>
  <div id="overlay" class="hidden">
    <div class="team-panel" id="panel-a">
      <div class="team-name" id="team-a-name">Team A</div>
      <div class="section-label">PICKS</div>
      <div class="char-slots picks" id="picks-a"></div>
      <div class="section-label">BANS</div>
      <div class="char-slots bans" id="bans-a"></div>
    </div>
    <div class="center-status">
      <div class="phase-badge" id="phase-badge">BAN PHASE</div>
      <div class="turn-indicator" id="turn-indicator"></div>
    </div>
    <div class="team-panel" id="panel-b">
      <div class="team-name" id="team-b-name">Team B</div>
      <div class="section-label">PICKS</div>
      <div class="char-slots picks" id="picks-b"></div>
      <div class="section-label">BANS</div>
      <div class="char-slots bans" id="bans-b"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="draft-overlay.js"></script>
</body>
</html>
